run_name: oft_qwen25_7b_h100_smoke100

data:
  prepared_dir: data/firefly_prepared
  train_file: train.jsonl
  val_file: val.jsonl
  test_file: test.jsonl
  max_length: 1024

model:
  model_name_or_path: Qwen/Qwen2.5-7B-Instruct
  trust_remote_code: true
  use_4bit: false
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: bfloat16
  dtype: bfloat16

oft:
  target_modules: all-linear
  oft_block_size: 32
  use_cayley_neumann: true
  module_dropout: 0.0
  bias: none
  coft: false
  eps: 6.0e-5

training:
  output_dir: outputs/h100_smoke100
  num_train_epochs: 1.0
  learning_rate: 1.0e-4
  warmup_ratio: 0.03
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  eval_strategy: steps
  eval_steps: 50
  save_steps: 100
  logging_steps: 10
  save_total_limit: 1
  max_steps: 100
  seed: 42
  lr_scheduler_type: cosine
  weight_decay: 0.0
  max_grad_norm: 1.0
  gradient_checkpointing: true
  bf16: true
  fp16: false
  packing: false
  assistant_only_loss: true
  report_to: none
